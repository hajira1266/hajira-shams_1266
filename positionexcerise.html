<!DOCTYPE html>
<html>
<head>
    <title>Task 3 Positioning</title>
    <style>
        * {
            margin: 0;
            padding: 0;
        }
        body {
            font-family: Arial, sans-serif;
            background: #f0f0f0;
            padding: 20px;
        }
        .container {
            max-width: 1000px;
            margin: 0 auto;
            background: white;
            padding: 30px;
        }
        h1 {
            text-align: center;
            color: #333;
            margin-bottom: 30px;
        }
        .fixed-header {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            background: #2c3e50;
            color: white;
            padding: 15px;
            text-align: center;
            z-index: 100;
        }
        .modal {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 400px;
            background: white;
            padding: 30px;
            border: 2px solid #3498db;
            z-index: 1000;
        }
        .sticky-sidebar {
            position: sticky;
            top: 70px;
            background: #3498db;
            color: white;
            padding: 20px;
            margin: 20px 0;
        }
        .zindex-demo {
            position: relative;
            height: 200px;
            margin: 30px 0;
        }
        .box1 {
            position: absolute;
            top: 0;
            left: 0;
            width: 150px;
            height: 150px;
            background: #e74c3c;
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1;
        }
        .box2 {
            position: absolute;
            top: 50px;
            left: 50px;
            width: 150px;
            height: 150px;
            background: #3498db;
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 2;
        }
        .box3 {
            position: absolute;
            top: 100px;
            left: 100px;
            width: 150px;
            height: 150px;
            background: #2ecc71;
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 3;
        }
        @media (max-width: 768px) {
            .fixed-header {
                position: static;
            }
            .modal {
                position: static;
                transform: none;
                width: 100%;
                margin: 20px 0;
            }
            .sticky-sidebar {
                position: static;
            }
            .box1, .box2, .box3 {
                position: static;
                margin: 10px 0;
            }
        }
    </style>
</head>
<body>
    <div class="fixed-header">Fixed Header - Becomes static on mobile</div>
    
    <div class="container">
        <h1>Task 3 Positioning</h1>
        
        <div class="modal">
            <h2>Modal Dialog</h2>
            <p>This is a modal. On mobile it becomes full width.</p>
        </div>
        
        <div class="sticky-sidebar">
            <p>Sticky Sidebar - Stacks on mobile</p>
        </div>
        
        <h2>Z-Index Layering</h2>
        <div class="zindex-demo">
            <div class="box1">Box 1</div>
            <div class="box2">Box 2</div>
            <div class="box3">Box 3</div>
        </div>
    </div>
</body>
</html>
