<!DOCTYPE html>
<html>
<head>
    <title>Task 13 Portfolio Mixed</title>
    <style>
        * {
            margin: 0;
            padding: 0;
        }
        body {
            font-family: Arial, sans-serif;
            background: #f0f0f0;
            padding: 20px;
        }
        .container {
            max-width: 1200px;
            margin: 0 auto;
            background: white;
            padding: 30px;
        }
        h1 {
            text-align: center;
            color: #333;
            margin-bottom: 30px;
        }
        .portfolio {
            display: grid;
            grid-template-areas: 
                "nav"
                "hero"
                "projects"
                "about"
                "contact"
                "footer";
        }
        .nav {
            grid-area: nav;
            background: #2c3e50;
            color: white;
            padding: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: sticky;
            top: 0;
        }
        .hero {
            grid-area: hero;
            background: linear-gradient(135deg, #3498db, #9b59b6);
            color: white;
            padding: 60px 20px;
            text-align: center;
        }
        .projects {
            grid-area: projects;
            padding: 40px 20px;
            display: flex;
            flex-wrap: wrap;
            gap: 20px;
            justify-content: center;
        }
        .project-card {
            width: 300px;
            background: #f9f9f9;
            border: 1px solid #ddd;
            border-radius: 5px;
            overflow: hidden;
        }
        .project-card img {
            width: 100%;
            height: 200px;
            background: #3498db;
        }
        .project-card h3, .project-card p {
            padding: 10px;
        }
        .about {
            grid-area: about;
            background: #ecf0f1;
            padding: 40px 20px;
        }
        .contact {
            grid-area: contact;
            background: white;
            padding: 40px 20px;
        }
        .footer {
            grid-area: footer;
            background: #2c3e50;
            color: white;
            padding: 20px;
            text-align: center;
        }
        @media (max-width: 768px) {
            .nav {
                flex-direction: column;
                gap: 10px;
            }
            .projects {
                flex-direction: column;
                align-items: center;
            }
            .project-card {
                width: 100%;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Task 13 Portfolio</h1>
        
        <div class="portfolio">
            <div class="nav">
                <div class="logo">MyPortfolio</div>
                <div class="menu">Home | About | Contact</div>
            </div>
            
            <div class="hero">
                <h2>Welcome to My Portfolio</h2>
                <p>Web Developer & Designer</p>
            </div>
            
            <div class="projects">
                <div class="project-card"><img><h3>Project 1</h3><p>Web App</p></div>
                <div class="project-card"><img><h3>Project 2</h3><p>Mobile App</p></div>
                <div class="project-card"><img><h3>Project 3</h3><p>E-commerce</p></div>
            </div>
            
            <div class="about">
                <h3>About Me</h3>
                <p>I am a web developer with 2 years of experience.</p>
            </div>
            
            <div class="contact">
                <h3>Contact</h3>
                <p>Email: student@example.com</p>
            </div>
            
            <div class="footer">
                <p>© 2026 My Portfolio</p>
            </div>
        </div>
    </div>
</body>
</html>
